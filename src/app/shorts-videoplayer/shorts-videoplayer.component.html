<div class="carousel">
  <div *ngIf="items.length > 0" class="carousel-container">
    <div class="carousel-slide" [ngClass]='{ left: currentIndex > 0, right: currentIndex < items.length - 1}'>
      <!-- Iterate over items and apply the active class to the current index -->

      <button class="arrows" (click)="prevVideo()" [disabled]="currentIndex === 0">
        〈
      </button>


      <div *ngFor="let item of items; let i = index">
        <div class="carousel-item" *ngIf="i === currentIndex">
          <app-shorts-video [videoInfo]="item"></app-shorts-video>
        </div>
      </div>

      
      <button class="arrows" (click)="nextVideo()" [disabled]="currentIndex === items.length - 1">
        〉
      </button>
    </div>
  </div>
</div>
